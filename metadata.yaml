abstract: |-
  Care is usually studied as a feeling, a virtue, or a practice, and studied that way it is hard to see what a hospital and a mother have in common, or why good intentions so often miscarry. This paper takes a colder primitive: one system cares for another when the other's viability enters its perception, model, and choice of action, with the ethical senses adding valence, an explicit model, and a submission to the other's consent. The claim is that this relation has a genuine geometry, and that the geometry is the information geometry of the other's viability. Represent the cared-for as a distribution over the states in which it can persist. The space of such distributions is a statistical manifold whose metric is not chosen but forced: Chentsov's theorem makes the Fisher-Rao metric the only one invariant under sufficient statistics, and on the three-state simplex it is a sphere of radius 2 with constant curvature a quarter, a value a from-scratch curvature routine recovers to machine precision. Care is then transport, moving the other along a geodesic toward the viable region, and the care-distance is the geodesic's length. Three results follow from the construction rather than from any tuning of it. Care-distance is a genuine metric, so it obeys the triangle inequality and the older claim that concern could reach a stranger more cheaply by routing through a friend was an artefact; the real obstruction is curvature, and a care-triangle carries a measurable spherical excess, a quarter of its area, by the Gauss-Bonnet theorem. Direction enters through the carer's control metric, a reweighting whose curvature is no longer constant and under which a distant stranger costs five times what kin cost along the same path. And the constraint that separates care from domination becomes a boundary fact: total coercion drives the other to a vertex of the simplex, a distribution of zero entropy, which is exactly Canguilhem's definition of the pathological, a life reduced to a single norm; holding the other off that boundary costs little viability, while abandoning it to an unguided drift costs half. What the geometry cannot reach is the inside of the relation, and the paper ends there, with Ruyer, on the one region that has no distance because it is present to itself without survey, and which a geometry of distances is built to miss.
